version: '3.8'

services:

  shard0-primary:
    image: mysql:8
    container_name: shard0-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - shard0-primary-data:/var/lib/mysql
      - ./shard0/primary.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - backend

  shard0-replica:
    image: mysql:8
    container_name: shard0-replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - shard0-replica-data:/var/lib/mysql
      - ./shard0/replica.cnf:/etc/mysql/conf.d/my.cnf
    depends_on:
      - shard0-primary
    networks:
      - backend

  shard1-primary:
    image: mysql:8
    container_name: shard1-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - shard1-primary-data:/var/lib/mysql
      - ./shard1/primary.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - backend

  shard1-replica:
    image: mysql:8
    container_name: shard1-replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - shard1-replica-data:/var/lib/mysql
      - ./shard1/replica.cnf:/etc/mysql/conf.d/my.cnf
    depends_on:
      - shard1-primary
    networks:
      - backend

  proxysql:
    image: proxysql/proxysql
    container_name: proxysql
    restart: always
    ports:
      - "6033:6033"   # app connects here
      - "6032:6032"   # admin
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      - shard0-primary
      - shard1-primary
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend      

networks:
  backend:

volumes:
  shard0-primary-data:
  shard0-replica-data:
  shard1-primary-data:
  shard1-replica-data: